name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Required by lib/config.ts at import time. CI uses dummy values; no
      # network calls happen during typecheck/lint/test.
      NODE_ENV: test
      LOG_LEVEL: silent
      ISSMANAGER_BASE_URL: http://example.invalid/api
      ISSMANAGER_CLIENT_ID: iss_v2_ci_placeholder
      ISSMANAGER_CLIENT_SECRET: ci-placeholder
      DATABASE_URL: postgres://u:p@localhost:5432/db
      PII_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  build:
    name: next build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    env:
      NODE_ENV: production
      LOG_LEVEL: info
      ISSMANAGER_BASE_URL: http://example.invalid/api
      ISSMANAGER_CLIENT_ID: iss_v2_ci_placeholder
      ISSMANAGER_CLIENT_SECRET: ci-placeholder
      DATABASE_URL: postgres://u:p@localhost:5432/db?sslmode=require
      PII_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
