services:
  postgres:
    image: postgres:16-alpine
    container_name: crmanaliz-postgres
    environment:
      POSTGRES_DB: crmanaliz
      POSTGRES_USER: crmanaliz
      POSTGRES_PASSWORD: dev_password_change_in_production
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crmanaliz']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crmanaliz-redis
    command: redis-server --requirepass dev_password_change_in_production
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api-production
    container_name: crmanaliz-api
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://crmanaliz:dev_password_change_in_production@postgres:5432/crmanaliz
      REDIS_URL: redis://:dev_password_change_in_production@redis:6379
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - /app/node_modules
    command: pnpm dev

  web:
    build:
      context: .
      target: web-production
    container_name: crmanaliz-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - /app/node_modules
    command: pnpm dev

volumes:
  postgres_data:
  redis_data:
